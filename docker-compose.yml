services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: shiroscan-api:dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      MAX_UPLOAD_MB: "10"
      OCR_PROVIDER: ${OCR_PROVIDER:-auto}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ALLOWED_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: artifacts/shiroscan/Dockerfile
    image: shiroscan-web:dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    depends_on:
      api:
        condition: service_healthy
