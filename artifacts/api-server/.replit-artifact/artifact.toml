kind = "api"
previewPath = "/api"
title = "ShiroScan API"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "ShiroScan API"
paths = ["/api"]

[services.development]
run = "python -m uvicorn app.main:app --app-dir ../../backend --host 0.0.0.0 --port 8080"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "../../backend/requirements.txt"]

[services.production.run]
args = ["python", "-m", "uvicorn", "app.main:app", "--app-dir", "../../backend", "--host", "0.0.0.0", "--port", "8080"]

[services.production.run.env]
PORT = "8080"
APP_ENV = "production"

[services.production.health.startup]
path = "/api/health"
