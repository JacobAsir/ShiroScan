kind = "web"
previewPath = "/"
title = "ShiroScan"
version = "1.0.0"
id = "artifacts/shiroscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19278

[services.development]
run = "pnpm --filter @workspace/shiroscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shiroscan", "run", "build" ]
publicDir = "artifacts/shiroscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19278"
BASE_PATH = "/"
