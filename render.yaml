services:
  # --- Backend: FastAPI Web Service ---
  - type: web
    name: shiroscan-backend
    plan: free   # Explicitly set to free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard — covers both OCR and summarization
      - key: CORS_ALLOWED_ORIGINS
        value: "*" # Update this to your frontend URL after deployment
      - key: PYTHON_VERSION
        value: 3.11.9

  # --- Frontend: Static Site ---
  - type: web            # Keep this as web
    name: shiroscan-frontend
    runtime: static      # This is the key that makes it a "Static Site"
    buildCommand: pnpm install --ignore-scripts && pnpm --filter @workspace/shiroscan run build
    staticPublishPath: ./artifacts/shiroscan/dist/public
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shiroscan-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
