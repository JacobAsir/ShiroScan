services:
  # --- Backend: FastAPI Web Service ---
  - type: web
    name: shiroscan-backend
    plan: free   # Explicitly set to free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard
      - key: CORS_ALLOWED_ORIGINS
        value: "*" # Update this to your frontend URL after deployment

  # --- Frontend: Truly Free Static Site ---
  - type: static_site  # Corrected from 'static' to 'static_site'
    name: shiroscan-frontend
    buildCommand: pnpm install --ignore-scripts && pnpm --filter @workspace/shiroscan run build
    staticPublishPath: ./artifacts/shiroscan/dist/public
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shiroscan-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
